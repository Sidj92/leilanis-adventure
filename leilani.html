<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emma's 4th Grade Adventure</title>
<style>
  :root{
    --deep-rose:#9d174d; --deep-rose-2:#a83254;
    --pink:#db2777; --pink-hover:#be185d; --accent:#ec4899;
    --blush:#fdf2f8; --blush-2:#fce7f3;
    --ink:#3a1226; --muted:#8a5a72;
    --good:#15803d; --good-bg:#dcfce7; --bad:#b91c1c; --bad-bg:#fee2e2;
    --card-shadow:0 4px 14px rgba(157,23,77,.12);
    --radius:16px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:linear-gradient(180deg,var(--blush) 0%,var(--blush-2) 100%);
    color:var(--ink); min-height:100vh; -webkit-text-size-adjust:100%;
  }
  .wrap{max-width:1200px;margin:0 auto;padding:16px}

  /* Header */
  header.app-header{
    background:linear-gradient(135deg,var(--deep-rose) 0%,var(--pink) 100%);
    color:#fff;border-radius:var(--radius);padding:20px 22px;
    box-shadow:var(--card-shadow);position:relative;overflow:hidden;
  }
  header.app-header h1{margin:0;font-size:1.9rem;letter-spacing:.3px}
  header.app-header p.sub{margin:6px 0 0;opacity:.95;font-size:1rem}
  .header-row{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap}
  .header-actions{display:flex;gap:10px;flex-wrap:wrap}
  button.pill{
    background:rgba(255,255,255,.18);color:#fff;border:1.5px solid rgba(255,255,255,.55);
    padding:10px 16px;border-radius:999px;font-size:.95rem;font-weight:700;cursor:pointer;
    transition:background .15s,transform .1s;
  }
  button.pill:hover{background:rgba(255,255,255,.32)}
  button.pill:active{transform:scale(.97)}
  button.pill:focus-visible{outline:3px solid #fff;outline-offset:2px}

  /* Progress */
  .progress-panel{
    background:#fff;border-radius:var(--radius);padding:16px 20px;margin-top:16px;
    box-shadow:var(--card-shadow);
  }
  .progress-top{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:10px}
  .progress-top strong{color:var(--deep-rose);font-size:1.05rem}
  .streak-msg{color:var(--muted);font-weight:600;font-size:.95rem}
  .bar-track{background:var(--blush-2);border-radius:999px;height:22px;overflow:hidden;border:1px solid #f3c4dc}
  .bar-fill{
    height:100%;width:0%;border-radius:999px;
    background:linear-gradient(90deg,var(--accent),var(--pink));
    transition:width .5s ease;display:flex;align-items:center;justify-content:flex-end;
    color:#fff;font-size:.75rem;font-weight:800;padding-right:8px;min-width:2ch;
  }

  /* Weeks accordion */
  .weeks{display:flex;flex-direction:column;gap:14px;margin-top:20px}
  .week-panel{border-radius:18px;overflow:hidden;box-shadow:var(--card-shadow);background:#fff}
  .week-header{
    width:100%;border:none;cursor:pointer;color:#fff;text-align:left;
    display:flex;align-items:center;gap:14px;padding:16px 18px;font-family:inherit;
    transition:filter .15s;
  }
  .week-header:hover{filter:brightness(1.05)}
  .week-header:focus-visible{outline:3px solid var(--deep-rose);outline-offset:-3px}
  .wh-emoji{font-size:2rem;line-height:1;flex-shrink:0;filter:drop-shadow(0 2px 3px rgba(0,0,0,.2))}
  .wh-text{display:flex;flex-direction:column;flex:1;min-width:0}
  .wh-title{font-size:1.15rem;font-weight:900;letter-spacing:.2px}
  .wh-blurb{font-size:.82rem;opacity:.92;font-weight:600}
  .wh-right{display:flex;align-items:center;gap:12px;flex-shrink:0}
  .wh-count{font-size:.85rem;font-weight:800;background:rgba(255,255,255,.22);padding:4px 10px;border-radius:999px;white-space:nowrap}
  .wh-ring{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative}
  .wh-ring::before{content:"";position:absolute;inset:4px;background:inherit;border-radius:50%;background:transparent}
  .wh-ring span{font-size:.66rem;font-weight:900;color:var(--deep-rose);background:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center}
  .wh-chevron{font-size:1.3rem;transition:transform .25s;display:inline-block}
  .week-panel.open .wh-chevron{transform:rotate(90deg)}
  .week-body{max-height:0;overflow:hidden;transition:max-height .35s ease;background:var(--blush)}
  .week-panel.open .week-body{max-height:3000px}
  .days-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:16px 18px}
  .week-panel.locked{opacity:.72;filter:grayscale(.4)}
  .week-panel.locked .week-header{cursor:not-allowed}
  .week-panel.locked .wh-chevron{display:none}
  .locked-note{padding:18px;color:var(--muted);font-weight:600;line-height:1.5}

  .day-card{
    background:#fff;border:2px solid #f6d3e4;border-radius:14px;padding:12px 14px;
    cursor:pointer;transition:transform .12s,box-shadow .12s,border-color .12s;box-shadow:0 2px 6px rgba(157,23,77,.08);
    position:relative;display:flex;flex-direction:column;
  }
  .day-card:hover{transform:translateY(-3px);box-shadow:var(--card-shadow);border-color:var(--accent)}
  .day-card:focus-visible{outline:3px solid var(--pink);outline-offset:2px}
  .day-card .daynum{font-size:.78rem;font-weight:800;color:var(--pink);text-transform:uppercase;letter-spacing:.4px;padding-right:22px}
  .day-card .topic-line{font-size:.86rem;font-weight:700;line-height:1.3;margin-top:6px;display:flex;gap:6px;align-items:flex-start}
  .day-card .topic-line .tl-icon{flex-shrink:0}
  .day-card.done{border-color:var(--good);background:linear-gradient(180deg,#f0fdf4,#fff)}
  .day-card .status-badge{position:absolute;top:10px;right:10px;font-size:1.1rem}
  .day-card.done .daynum{color:var(--good)}
  .mini-prog{height:6px;background:var(--blush-2);border-radius:999px;margin-top:auto;overflow:hidden;margin-top:10px}
  .mini-prog span{display:block;height:100%;background:var(--pink);width:0%}
  .placeholder-tag{display:inline-block;font-size:.62rem;font-weight:800;background:#fef3c7;color:#92400e;padding:2px 6px;border-radius:6px;margin-top:6px;align-self:flex-start}

  /* Day nav buttons */
  .day-banner .db-actions,.day-footer{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;align-items:center}
  .day-banner .db-msg{margin-bottom:12px}
  .day-banner .db-actions{margin-bottom:2px}
  .day-footer{margin-top:16px;padding-top:14px;border-top:1px dashed #f0c4da}
  .nav-btn{border:none;border-radius:999px;padding:10px 20px;font-size:.95rem;font-weight:800;cursor:pointer;font-family:inherit;transition:transform .1s,filter .15s}
  .nav-btn:active{transform:scale(.96)}
  .nav-btn:focus-visible{outline:3px solid var(--deep-rose);outline-offset:2px}
  .nav-btn.next{background:#fff;color:var(--good)}
  .nav-btn.back{background:rgba(255,255,255,.25);color:#fff;border:1.5px solid rgba(255,255,255,.7)}
  .nav-btn.next:hover,.nav-btn.back:hover{filter:brightness(1.08)}
  .nav-btn.next:disabled{opacity:.7;cursor:default}
  .nav-btn.ghost{background:#fff;color:var(--pink);border:2px solid var(--pink)}
  .nav-btn.ghost:hover{background:var(--blush-2)}

  /* Modal */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(58,18,38,.55);display:none;align-items:flex-start;justify-content:center;
    padding:20px;z-index:100;overflow:hidden;
  }
  .modal-overlay.open{display:flex}
  .modal{
    background:var(--blush);border-radius:20px;max-width:900px;width:100%;margin:0 auto;
    box-shadow:0 20px 60px rgba(58,18,38,.4);position:relative;
    display:flex;flex-direction:column;max-height:calc(100vh - 40px);overflow:hidden;
  }
  .modal-header{
    background:linear-gradient(135deg,var(--deep-rose),var(--pink));color:#fff;
    padding:18px 22px;border-radius:20px 20px 0 0;flex:0 0 auto;z-index:2;
  }
  .modal-header h2{margin:0;font-size:1.3rem}
  .modal-header .stds{font-size:.82rem;opacity:.95;margin-top:4px}
  .modal-close{
    position:absolute;top:14px;right:16px;background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.6);
    color:#fff;width:38px;height:38px;border-radius:50%;font-size:1.2rem;cursor:pointer;line-height:1;
  }
  .modal-close:hover{background:rgba(255,255,255,.35)}
  .modal-close:focus-visible{outline:3px solid #fff;outline-offset:2px}
  .modal-body{padding:20px 22px 26px;overflow-y:auto;flex:1 1 auto;-webkit-overflow-scrolling:touch}
  .section-label{font-size:1.05rem;font-weight:800;color:var(--deep-rose);margin:18px 0 10px;display:flex;align-items:center;gap:8px}
  .section-label:first-child{margin-top:0}

  /* Question card */
  .q{background:#fff;border:2px solid #f6d3e4;border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 2px 6px rgba(157,23,77,.06)}
  .q.solved{border-color:var(--good);background:linear-gradient(180deg,#f6fef9,#fff)}
  .q-prompt{font-size:1.02rem;line-height:1.5;margin-bottom:12px}
  .q-num{font-weight:800;color:var(--pink);margin-right:6px}
  fieldset.choices{border:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px}
  fieldset.choices legend{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}
  label.choice{
    display:flex;align-items:center;gap:10px;background:var(--blush);border:2px solid #f6d3e4;border-radius:10px;
    padding:10px 12px;cursor:pointer;font-size:1rem;transition:border-color .12s,background .12s;
  }
  label.choice:hover{border-color:var(--accent)}
  label.choice input{accent-color:var(--pink);width:18px;height:18px}
  label.choice.chosen{border-color:var(--pink);background:var(--blush-2)}
  input.text-answer{
    font-size:1.05rem;padding:10px 12px;border:2px solid #f0b9d4;border-radius:10px;width:100%;max-width:260px;
    font-family:inherit;color:var(--ink);
  }
  input.text-answer:focus-visible{outline:3px solid var(--accent);outline-offset:1px;border-color:var(--pink)}
  .check-btn{
    margin-top:12px;background:var(--pink);color:#fff;border:none;border-radius:10px;padding:10px 20px;
    font-size:.98rem;font-weight:800;cursor:pointer;transition:background .15s,transform .1s;
  }
  .check-btn:hover{background:var(--pink-hover)}
  .check-btn:active{transform:scale(.97)}
  .check-btn:focus-visible{outline:3px solid var(--deep-rose);outline-offset:2px}
  .check-btn:disabled{background:var(--good);cursor:default}
  .feedback{margin-top:12px;border-radius:10px;padding:0;font-size:.98rem;line-height:1.5}
  .feedback.show{padding:12px 14px}
  .feedback.good{background:var(--good-bg);color:var(--good);border:1.5px solid #86efac}
  .feedback.bad{background:var(--bad-bg);color:var(--bad);border:1.5px solid #fca5a5}
  .feedback .fb-title{font-weight:800;margin-bottom:6px}
  .hint-step{display:flex;align-items:center;gap:6px;font-family:"SF Mono",Menlo,Consolas,monospace;font-size:.95rem;color:var(--ink);padding:2px 0}
  .hint-step .arrow{color:var(--pink);font-weight:800}

  /* Reading module: passage side-by-side with questions */
  .reading-module{background:#fff;border:2px solid #f6d3e4;border-radius:14px;padding:16px;margin-bottom:16px}
  .reading-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .passage-box{background:var(--blush);border-left:5px solid var(--accent);border-radius:10px;padding:14px 16px}
  .passage-box h4{margin:0 0 8px;color:var(--deep-rose);font-size:.95rem}
  .passage-box p{margin:0;line-height:1.6;font-size:1rem}
  .rq-list .q{border:none;box-shadow:none;padding:0 0 6px;margin-bottom:14px;border-bottom:1px dashed #f0c4da;background:transparent}
  .rq-list .q:last-child{border-bottom:none}
  .rq-list .q.solved{background:transparent}

  /* Fractions & exponents */
  .frac{display:inline-flex;flex-direction:column;text-align:center;vertical-align:middle;margin:0 3px;line-height:1}
  .frac .num{border-bottom:2px solid currentColor;padding:0 4px 1px}
  .frac .den{padding:1px 4px 0}
  sup{font-size:.72em}

  /* Day complete banner */
  .day-banner{
    display:none;background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;border-radius:14px;
    padding:16px 18px;text-align:center;font-size:1.1rem;font-weight:800;margin-bottom:16px;animation:pop .4s ease;
  }
  .day-banner.show{display:block}
  @keyframes pop{0%{transform:scale(.85);opacity:0}100%{transform:scale(1);opacity:1}}
  .reset-day-btn{
    background:#fff;border:2px solid var(--pink);color:var(--pink);border-radius:10px;padding:8px 16px;
    font-weight:700;cursor:pointer;font-size:.9rem;margin-top:6px;
  }
  .reset-day-btn:hover{background:var(--blush-2)}

  /* Confetti canvas */
  #confetti{position:fixed;inset:0;pointer-events:none;z-index:200;display:none}

  /* Analytics */
  .analytics-modal .modal-body{padding:22px}
  .cards-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
  .stat-card{background:#fff;border-radius:14px;padding:14px;text-align:center;box-shadow:var(--card-shadow);border:2px solid #f6d3e4}
  .stat-card .num{font-size:1.7rem;font-weight:900;color:var(--pink)}
  .stat-card .lbl{font-size:.78rem;color:var(--muted);font-weight:700;margin-top:2px}
  .analytics-section{background:#fff;border-radius:14px;padding:16px 18px;margin-bottom:16px;box-shadow:0 2px 6px rgba(157,23,77,.06)}
  .analytics-section h3{margin:0 0 12px;color:var(--deep-rose);font-size:1.05rem}
  .subj-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
  .subj-row .subj-name{width:90px;font-weight:800;color:var(--ink)}
  .subj-bar-track{flex:1;background:var(--blush-2);border-radius:999px;height:20px;overflow:hidden;border:1px solid #f3c4dc}
  .subj-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--pink));display:flex;align-items:center;justify-content:flex-end;color:#fff;font-size:.72rem;font-weight:800;padding-right:6px;min-width:2ch}
  .subj-meta{width:110px;font-size:.82rem;color:var(--muted);text-align:right}
  .topic-item{border-left:5px solid var(--pink);background:var(--blush);border-radius:8px;padding:10px 12px;margin-bottom:10px}
  .topic-item.strong{border-left-color:var(--good);background:#f0fdf4}
  .topic-item .std-code{font-size:.72rem;font-weight:800;color:var(--pink);letter-spacing:.3px}
  .topic-item.strong .std-code{color:var(--good)}
  .topic-item .topic-title{font-weight:700;margin:2px 0}
  .topic-item .topic-meta{font-size:.82rem;color:var(--muted)}
  .empty-note{color:var(--muted);font-style:italic;font-size:.92rem}
  .reset-analytics-btn{background:#fff;border:2px solid var(--bad);color:var(--bad);border-radius:10px;padding:10px 18px;font-weight:800;cursor:pointer}
  .reset-analytics-btn:hover{background:var(--bad-bg)}

  /* Responsive */
  @media (max-width:900px){
    .days-grid{grid-template-columns:repeat(2,1fr)}
    .cards-row{grid-template-columns:repeat(2,1fr)}
    .reading-grid{grid-template-columns:1fr}
    .wh-blurb{display:none}
  }
  @media (max-width:560px){
    .days-grid{grid-template-columns:1fr}
    .cards-row{grid-template-columns:1fr}
    .wh-count{display:none}
    header.app-header h1{font-size:1.5rem}
  }
</style>
</head>
<body>
<canvas id="confetti"></canvas>
<div class="wrap">
  <header class="app-header">
    <div class="header-row">
      <div>
        <h1>🌸 Emma &amp; Leilani's 4th Grade Adventure</h1>
        <p class="sub" id="welcomeMsg">Welcome back, Emma! Let's keep your 28-day launch going.</p>
      </div>
      <div class="header-actions">
        <button class="pill" id="analyticsBtn" aria-label="Open Parent Analytics dashboard">📊 Parent Analytics</button>
      </div>
    </div>
    <div class="progress-panel">
      <div class="progress-top">
        <strong>Emma's Progress</strong>
        <span class="streak-msg" id="streakMsg"></span>
      </div>
      <div class="bar-track" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="Overall challenge completion" id="progressBar">
        <div class="bar-fill" id="progressFill">0%</div>
      </div>
    </div>
  </header>

  <div class="weeks" id="weeksGrid"></div>
</div>

<!-- Day modal -->
<div class="modal-overlay" id="dayOverlay" role="dialog" aria-modal="true" aria-labelledby="dayModalTitle">
  <div class="modal">
    <div class="modal-header">
      <button class="modal-close" id="dayClose" aria-label="Close day and return to dashboard">✕</button>
      <h2 id="dayModalTitle"></h2>
      <div class="stds" id="dayModalStds"></div>
    </div>
    <div class="modal-body" id="dayModalBody"></div>
  </div>
</div>

<!-- Analytics modal -->
<div class="modal-overlay analytics-modal" id="analyticsOverlay" role="dialog" aria-modal="true" aria-labelledby="analyticsTitle">
  <div class="modal">
    <div class="modal-header">
      <button class="modal-close" id="analyticsClose" aria-label="Close analytics dashboard">✕</button>
      <h2 id="analyticsTitle">📊 Parent Analytics — Emma</h2>
      <div class="stds">A first-attempt view of where Emma is thriving and where she needs review.</div>
    </div>
    <div class="modal-body" id="analyticsBody"></div>
  </div>
</div>

<script>
/* ============================================================
   Emma & Leilani's 4th Grade Adventure — self-contained app
   ============================================================ */
/* ===== PER-CHILD CONFIG =====
   Emma is the default (pink). A copy of this file named leilani.html — or
   opening it with #child=leilani — becomes Leilani's purple version.
   Each child keeps her own separate saved progress. */
const CHILD = /leilani/i.test((location.pathname || "") + location.hash + location.search) ? "leilani" : "emma";
const NAME = (CHILD === "leilani") ? "Leilani" : "Emma";
const SWAP_NAMES = (CHILD === "leilani");
const STORAGE_KEY = (CHILD === "leilani") ? "leilani_4th_grade_v1" : "emma_4th_grade_v1";
const STUDENT = NAME;
const FLOWER = (CHILD === "leilani") ? "🪻" : "🌸";

/* Apply the purple theme for Leilani (overrides the pink CSS variables) */
if(CHILD === "leilani"){
  const s = document.createElement("style");
  s.textContent = `:root{--deep-rose:#6b21a8;--deep-rose-2:#7e22ce;--pink:#9333ea;--pink-hover:#7e22ce;--accent:#a855f7;--blush:#faf5ff;--blush-2:#f3e8ff;--ink:#2e1065;--muted:#7c6a93;--card-shadow:0 4px 14px rgba(107,33,168,.14);}
    .day-card,.q,.reading-module,.stat-card{border-color:#e9d5ff}
    .bar-track,.subj-bar-track{border-color:#ddd6fe}
    input.text-answer{border-color:#c4b5fd}
    .rq-list .q,.day-footer{border-color:#e9d5ff}
    .placeholder-tag{background:#ede9fe;color:#5b21b6}
    .modal-overlay{background:rgba(46,16,101,.55)}`;
  (document.head || document.documentElement).appendChild(s);
}

/* Swap the names Emma<->Leilani inside a string (personalises shared stories per file) */
function swapEL(s){
  return (typeof s === "string")
    ? s.replace(/Emma|Leilani/g, m => (m === "Emma" ? "Leilani" : "Emma"))
    : s;
}
function deepSwapNames(cur){
  const arr = a => Array.isArray(a) ? a.map(swapEL) : a;
  cur.forEach(d=>{
    d.mathTitle = swapEL(d.mathTitle); d.elaTitle = swapEL(d.elaTitle);
    d.math.forEach(q=>{ q.prompt=swapEL(q.prompt); q.choices=arr(q.choices); q.hint=arr(q.hint); q.accept=arr(q.accept); });
    d.reading.forEach(m=>{ m.passage=swapEL(m.passage); m.topic=swapEL(m.topic);
      m.questions.forEach(q=>{ q.prompt=swapEL(q.prompt); q.choices=arr(q.choices); q.hint=arr(q.hint); q.accept=arr(q.accept); }); });
  });
}

/* ---------- Visual math helpers ---------- */
function frac(num, den){
  return `<span class="frac" aria-label="${num} over ${den}"><span class="num">${num}</span><span class="den">${den}</span></span>`;
}
function exp(base, power){
  return `<span aria-label="${base} to the power of ${power}">${base}<sup>${power}</sup></span>`;
}

/* ---------- Forgiving text normalization ---------- */
function normalize(s){
  return String(s)
    .trim()
    .toLowerCase()
    .replace(/[.,!?;:]+$/g, "")
    .replace(/\s+/g, " ");
}
function textCorrect(val, acceptable){
  const n = normalize(val);
  if(n === "") return false;
  return acceptable.map(normalize).includes(n);
}

/* ============================================================
   CURRICULUM DATA
   ============================================================ */

/* Standards table — verified Florida B.E.S.T. codes (day headers) */
const STANDARDS = [
  /* ---- Week 1 — 3rd Grade Mastery: Numbers, Operations & Fractions (authored) ---- */
  {day:1,  week:1, mathStd:"MA.3.NSO.2.1", mathTitle:"Adding & Subtracting Multi-Digit Numbers", elaStd:"ELA.3.R.1.1", elaTitle:"Character & Plot"},

/* ---------- Template builder (unused once all days authored; kept for safety) ---------- */
function buildTemplateDay(entry){
  const kind = entry.review ? "Weekly Review" : (entry.grad ? "Graduation Quiz" : "Daily Practice");
  const mathTopic = entry.mathTitle;
  const elaTopic = entry.elaTitle;
  const mathPool = [
    {q:`Sample problem (placeholder) for "${mathTopic}": 24 + 18 = ?`, accept:["42"], hint:["24 + 18","Answer → 42"]},
    {q:`Sample problem (placeholder) for "${mathTopic}": 56 − 19 = ?`, accept:["37"], hint:["56 − 19","Answer → 37"]},
    {q:`Sample problem (placeholder) for "${mathTopic}": 9 × 6 = ?`, accept:["54"], hint:["9 × 6","Answer → 54"]},
    {q:`Sample problem (placeholder) for "${mathTopic}": 48 ÷ 6 = ?`, accept:["8"], hint:["48 ÷ 6","Answer → 8"]},
  ];
  const math = mathPool.map((p,i)=>({ id:`d${entry.day}-m${i+1}`, type:"text", placeholder:true, prompt:p.q, accept:p.accept, hint:p.hint }));
  const reading = [1,2].map(mi=>({
    std:entry.elaStd, topic:elaTopic, placeholder:true,
    passage:`(Placeholder passage — ${kind}.) Practicing "${elaTopic}". Real story text is coming soon!`,
    questions:[
      {id:`d${entry.day}-r${mi}-1`, type:"mc", placeholder:true, prompt:`Sample question: This passage is about which skill?`, choices:[elaTopic, "Long division", "Telling time", "None of these"], answer:0, hint:[`Answer → ${elaTopic}`]},
      {id:`d${entry.day}-r${mi}-2`, type:"text", placeholder:true, prompt:`Sample question: Type this student's name.`, accept:["emma","leilani"], hint:["It is in the title"]},
    ],
  }));
  return {math, reading};
}

function dayQuestions(d){

/* ============================================================
   STATE + PERSISTENCE
   ============================================================ */
let STATE = loadState();
migrateState();

function defaultState(){ return { solved:{}, completedDays:[], analytics:{} }; }
function migrateState(){
  if(STATE.contentVersion === 2) return;
  const isWeek1 = id => /^d[1-7]-/.test(id);
  Object.keys(STATE.solved || {}).forEach(id=>{ if(!isWeek1(id)) delete STATE.solved[id]; });
  Object.keys(STATE.analytics || {}).forEach(id=>{ if(!isWeek1(id)) delete STATE.analytics[id]; });
  STATE.completedDays = (STATE.completedDays || []).filter(d => d >= 1 && d <= 7);
  STATE.contentVersion = 2;
  saveState();
}
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return defaultState();
    const parsed = JSON.parse(raw);
    return Object.assign(defaultState(), parsed);
  }catch(e){ return defaultState(); }
}
function saveState(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(STATE)); }catch(e){}
}

function recordAttempt(q, isCorrect){
  const a = STATE.analytics;
  if(!a[q.id]){
    a[q.id] = { subject:q.subject, standard:q.standard, topic:q.topic, day:q.day, attempts:0, solved:false, firstTry:false, retries:0 };
  }
  const rec = a[q.id];
  if(rec.solved) return;
  rec.attempts += 1;
  if(isCorrect){ rec.solved = true; rec.firstTry = (rec.attempts === 1); rec.retries = rec.attempts - 1; }
  else { rec.retries = rec.attempts - 1; }
  saveState();
}

function isDayComplete(d){ return dayQuestions(d).every(q => STATE.solved[q.id]); }
function markSolved(q){ STATE.solved[q.id] = true; saveState(); }
function updateDayCompletion(d){
  const complete = isDayComplete(d);
  const idx = STATE.completedDays.indexOf(d.day);
  if(complete && idx === -1){ STATE.completedDays.push(d.day); saveState(); return true; }
  if(!complete && idx !== -1){ STATE.completedDays.splice(idx,1); saveState(); }
  return false;
}
function resetDay(d){
  dayQuestions(d).forEach(q=>{ delete STATE.solved[q.id]; delete STATE.analytics[q.id]; });
  const idx = STATE.completedDays.indexOf(d.day);
  if(idx !== -1) STATE.completedDays.splice(idx,1);
  saveState();
}

  2:{name:"3rd Grade Mastery · Pt 2",emoji:"📐", blurb:"Reasoning, time, geometry & data",                 grad:"linear-gradient(135deg,var(--pink-hover),var(--accent))"},
  3:{name:"Bridge to 4th Grade",     emoji:"🌉", blurb:"Big numbers, division & an intro to decimals",      grad:"linear-gradient(135deg,var(--deep-rose),var(--pink))"},
  4:{name:"4th Grade Launch",        emoji:"🚀", blurb:"Fractions, angles, measurement & data",             grad:"linear-gradient(135deg,var(--deep-rose-2),var(--accent))"},
};

let openWeekNum = (function(){
  const firstOpen = CURRICULUM.find(d=>!isDayComplete(d));
  return firstOpen ? firstOpen.week : 1;
})();

function weekStats(w){
  const days = CURRICULUM.filter(d=>d.week===w);
  const done = days.filter(d=>isDayComplete(d)).length;
  return {done, total:days.length, pct:Math.round((done/days.length)*100)};
}
function weekUnlocked(w){
  if(w <= 1) return true;
  const prev = weekStats(w-1);
  return prev.done === prev.total;
}

function renderDashboard(){
  weeksGrid.innerHTML = "";
  for(let w=1; w<=4; w++){ weeksGrid.appendChild(renderWeekPanel(w)); }
  updateProgress();
}

function renderWeekPanel(w){
  const meta = WEEKS[w];
  const st = weekStats(w);
  const unlocked = weekUnlocked(w);
  const isOpen = (openWeekNum === w) && unlocked;
  const panel = document.createElement("div");
  panel.className = "week-panel" + (isOpen ? " open" : "") + (st.done===st.total ? " week-done" : "") + (unlocked ? "" : " locked");

  const header = document.createElement("button");
  header.className = "week-header";
  header.style.background = meta.grad;
  header.setAttribute("aria-expanded", isOpen ? "true" : "false");
  header.setAttribute("aria-controls", `week-body-${w}`);
  if(!unlocked){
    header.setAttribute("aria-label", `Week ${w}: ${meta.name}. Locked. Finish Week ${w-1} to unlock.`);
    header.setAttribute("aria-disabled", "true");
    header.innerHTML = `
      <span class="wh-emoji" aria-hidden="true">🔒</span>
      <span class="wh-text">
        <span class="wh-title">Week ${w} · ${meta.name}</span>
        <span class="wh-blurb">🔒 Finish Week ${w-1} to unlock this week</span>
      </span>
      <span class="wh-right">
        <span class="wh-count">Locked</span>
      </span>`;
  } else {
    header.setAttribute("aria-label", `Week ${w}: ${meta.name}. ${st.done} of ${st.total} days complete. ${isOpen ? "Expanded" : "Collapsed"}. Press Enter to ${isOpen?"collapse":"expand"}.`);
    header.innerHTML = `
      <span class="wh-emoji" aria-hidden="true">${meta.emoji}</span>
      <span class="wh-text">
        <span class="wh-title">Week ${w} · ${meta.name} ${st.done===st.total?'🏆':''}</span>
        <span class="wh-blurb">${meta.blurb}</span>
      </span>
      <span class="wh-right">
        <span class="wh-count">${st.done}/${st.total} days</span>
        <span class="wh-ring" style="background:conic-gradient(#fff ${st.pct}%, rgba(255,255,255,.3) ${st.pct}%)"><span>${st.pct}%</span></span>
        <span class="wh-chevron" aria-hidden="true">▸</span>
      </span>`;
  }
  header.addEventListener("click", ()=>toggleWeek(w));

  const body = document.createElement("div");
  body.className = "week-body";
  body.id = `week-body-${w}`;
  if(unlocked){
    const grid = document.createElement("div");
    grid.className = "days-grid";
    CURRICULUM.filter(d=>d.week===w).forEach(d=>grid.appendChild(renderDayCard(d)));
    body.appendChild(grid);
  } else {
    const msg = document.createElement("div");
    msg.className = "locked-note";
    msg.innerHTML = `🔒 <strong>Week ${w} is locked.</strong> Complete all 7 days of Week ${w-1} to unlock it. Keep going — you're getting closer!`;
    body.appendChild(msg);
  }

  panel.appendChild(header);
  panel.appendChild(body);
  return panel;
}

function toggleWeek(w){
  if(!weekUnlocked(w)) return;
  openWeekNum = (openWeekNum === w) ? 0 : w;
  renderDashboard();
}
function openWeek(w){
  openWeekNum = w;
  renderDashboard();
  const panel = weeksGrid.children[w-1];
  if(panel && panel.scrollIntoView) panel.scrollIntoView({behavior:"smooth", block:"start"});
}

function renderDayCard(d){
  const qs = dayQuestions(d);
  const solvedCount = qs.filter(q=>STATE.solved[q.id]).length;
  const done = isDayComplete(d);
  const card = document.createElement("div");
  card.className = "day-card" + (done ? " done" : "");
  card.setAttribute("role","button");
  card.setAttribute("tabindex","0");
  const kindLabel = d.grad ? "Graduation Quiz" : (d.review ? "Weekly Review" : "");
  const label = `Day ${d.day}: Math — ${d.mathTitle}; Reading — ${d.elaTitle}. ${solvedCount} of ${qs.length} questions complete. ${done ? "Completed." : "Not yet complete."} Press Enter to open.`;
  card.setAttribute("aria-label", label);
  const pct = Math.round((solvedCount/qs.length)*100);
  card.innerHTML = `
    <div class="status-badge" aria-hidden="true">${done ? "✅" : FLOWER}</div>
    <div class="daynum">Day ${d.day}${kindLabel?` · ${kindLabel}`:""}</div>
    <div class="topic-line"><span class="tl-icon" aria-hidden="true">📗</span><span>${d.mathTitle}</span></div>
    <div class="topic-line"><span class="tl-icon" aria-hidden="true">📖</span><span>${d.elaTitle}</span></div>
    ${d.placeholder ? '<span class="placeholder-tag">🔧 Template — content coming soon</span>' : ''}
    <div class="mini-prog" aria-hidden="true"><span style="width:${pct}%"></span></div>
  `;
  card.addEventListener("click", ()=>openDay(d));
  card.addEventListener("keydown", e=>{ if(e.key==="Enter" || e.key===" "){ e.preventDefault(); openDay(d); } });
  return card;
}

function updateProgress(){
  const done = STATE.completedDays.length;
  const pct = Math.round((done/28)*100);
  const fill = document.getElementById("progressFill");
  const bar = document.getElementById("progressBar");
  fill.style.width = pct + "%";
  fill.textContent = pct + "%";
  bar.setAttribute("aria-valuenow", pct);
  const streak = document.getElementById("streakMsg");
  let msg;
  if(done===0) msg = `🌟 Ready when you are, ${NAME} — tap Day 1 to begin!`;
  else if(done<7) msg = `🔥 ${done} day${done>1?'s':''} down! Keep the streak going, ${NAME}!`;
  else if(done<14) msg = `💪 ${done} days complete — Week 1 legend, ${NAME}!`;
  else if(done<21) msg = `🚀 ${done} days done — you're over halfway, ${NAME}!`;
  else if(done<28) msg = `🏆 ${done} days! The graduation quiz is in sight, ${NAME}!`;
  else msg = `🎓 All 28 days complete! ${NAME}, you're 4th-grade ready!`;
  streak.textContent = msg;
}

/* ============================================================
   DAY MODAL
   ============================================================ */
const dayOverlay = document.getElementById("dayOverlay");
const dayModalBody = document.getElementById("dayModalBody");
let currentDay = null;
let lastFocused = null;

function distinctStds(qs, subject){
  const seen = [];
  qs.filter(q=>q.subject===subject).forEach(q=>{ if(!seen.includes(q.standard)) seen.push(q.standard); });
  return seen.join(" · ");
}
function openDay(d){
  if(!weekUnlocked(d.week)) return;
  currentDay = d;
  lastFocused = document.activeElement;
  document.getElementById("dayModalTitle").textContent = `Day ${d.day} — ${d.review ? "Weekly Review" : (d.grad ? "Graduation Quiz" : d.mathTitle)}`;
  const qs = dayQuestions(d);
  document.getElementById("dayModalStds").innerHTML =
    `📗 Math B.E.S.T.: ${distinctStds(qs,"Math")} &nbsp;|&nbsp; 📖 Reading B.E.S.T.: ${distinctStds(qs,"Reading")}`;
  renderDayBody(d);
  dayOverlay.classList.add("open");
  document.body.style.overflow = "hidden";
  dayModalBody.scrollTop = 0;
  document.getElementById("dayClose").focus();
}
function closeDay(){
  dayOverlay.classList.remove("open");
  document.body.style.overflow = "";
  if(currentDay) openWeekNum = currentDay.week;
  renderDashboard();
  if(lastFocused) lastFocused.focus();
}

function renderDayBody(d){
  const complete = isDayComplete(d);
  const nextDay = CURRICULUM.find(x=>x.day===d.day+1);
  let html = "";
  html += `<div class="day-banner ${complete ? 'show':''}" id="dayBanner">
    <div class="db-msg">🎉 Way to go, ${NAME}! You finished Day ${d.day}! 🎉</div>
    <div class="db-actions">
      <button class="nav-btn back" id="navBackBtn">📚 Back to Week ${d.week}</button>
      ${nextDay
        ? `<button class="nav-btn next" id="navNextBtn">Next: Day ${nextDay.day} ➜</button>`
        : `<button class="nav-btn next" id="navNextBtn" disabled>🎓 That was the last day!</button>`}
    </div>
  </div>`;

  html += `<div class="section-label">📗 Math — ${d.mathTitle}</div>`;
  d.math.forEach((q,i)=> html += renderQuestion(q, i+1, "math"));

  html += `<div class="section-label">📖 Reading — ${d.elaTitle}</div>`;
  d.reading.forEach((m,mi)=>{
    html += `<div class="reading-module"><div class="reading-grid">`;
    html += `<div class="passage-box"><h4>📕 Read closely${m.placeholder?' (placeholder)':''}</h4><p>${m.passage}</p></div>`;
    html += `<div class="rq-list">`;
    m.questions.forEach((q,qi)=> html += renderQuestion(q, qi+1, "reading"));
    html += `</div></div></div>`;
  });

  html += `<div class="day-footer">
    <button class="nav-btn ghost" id="footBackBtn">← Back to Week ${d.week}</button>
    ${nextDay ? `<button class="nav-btn ghost" id="footNextBtn">Go to Day ${nextDay.day} →</button>` : ""}
    <button class="reset-day-btn" id="resetDayBtn" aria-label="Reset Day ${d.day} progress">↺ Reset this day</button>
  </div>`;

  dayModalBody.innerHTML = html;
  dayQuestions(d).forEach(q=>wireQuestion(q));

  const goBack = ()=>closeDay();
  const goNext = ()=>{ if(nextDay) openDay(nextDay); };
  document.getElementById("navBackBtn").addEventListener("click", goBack);
  document.getElementById("footBackBtn").addEventListener("click", goBack);
  const navNext = document.getElementById("navNextBtn");
  if(navNext && nextDay) navNext.addEventListener("click", goNext);
  const footNext = document.getElementById("footNextBtn");
  if(footNext) footNext.addEventListener("click", goNext);

  document.getElementById("resetDayBtn").addEventListener("click", ()=>{
    if(confirm(`Reset all of Day ${d.day} for ${NAME}? This clears her answers and this day's analytics.`)){
      resetDay(d);
      renderDayBody(d);
    }
  });
}

function renderQuestion(q, num, kind){
  const solved = !!STATE.solved[q.id];
  let inner = `<div class="q-prompt"><span class="q-num">${kind==="math"?"Q"+num:num+"."}</span>${q.prompt}</div>`;
  if(q.type==="mc"){
    inner += `<fieldset class="choices" role="radiogroup" aria-label="Choose your answer"><legend>Choose one answer</legend>`;
    q.choices.forEach((c,ci)=>{
      const id = `${q.id}-c${ci}`;
      inner += `<label class="choice" for="${id}"><input type="radio" id="${id}" name="${q.id}" value="${ci}" ${solved && ci===q.answer?'checked':''} ${solved?'disabled':''}> <span>${c}</span></label>`;
    });
    inner += `</fieldset>`;
  } else {
    const val = solved ? (q.accept[0]) : "";
    inner += `<input class="text-answer" type="text" id="${q.id}-input" aria-label="Type your answer" value="${val}" ${solved?'disabled':''} autocomplete="off">`;
  }
  inner += `<div><button class="check-btn" id="${q.id}-btn" ${solved?'disabled':''}>${solved?'✓ Correct!':'Check Answer'}</button></div>`;
  const fbText = solved ? `<div class="fb-title">✅ Great job, ${NAME}!</div>` : "";
  inner += `<div class="feedback ${solved?'good show':''}" id="${q.id}-fb" role="status" aria-live="polite">${fbText}</div>`;
  return `<div class="q ${solved?'solved':''}" id="${q.id}-wrap">${inner}</div>`;
}

function wireQuestion(q){
  const btn = document.getElementById(`${q.id}-btn`);
  if(q.type==="mc"){
    document.querySelectorAll(`input[name="${q.id}"]`).forEach(inp=>{
      inp.addEventListener("change", ()=>{
        document.querySelectorAll(`#${q.id}-wrap label.choice`).forEach(l=>l.classList.remove("chosen"));
        inp.closest("label.choice").classList.add("chosen");
      });
    });
  }
  if(btn && !STATE.solved[q.id]){
    btn.addEventListener("click", ()=>checkQuestion(q));
  }
  if(q.type==="text"){
    const inp = document.getElementById(`${q.id}-input`);
    if(inp && !STATE.solved[q.id]){
      inp.addEventListener("keydown", e=>{ if(e.key==="Enter"){ e.preventDefault(); checkQuestion(q); } });
    }
  }
}

function checkQuestion(q){
  let correct = false;
  let answered = true;
  if(q.type==="mc"){
    const sel = document.querySelector(`input[name="${q.id}"]:checked`);
    if(!sel){ answered = false; }
    else correct = (parseInt(sel.value,10) === q.answer);
  } else {
    const inp = document.getElementById(`${q.id}-input`);
    if(normalize(inp.value)===""){ answered = false; }
    else correct = textCorrect(inp.value, q.accept);
  }
  const fb = document.getElementById(`${q.id}-fb`);
  if(!answered){
    fb.className = "feedback bad show";
    fb.innerHTML = `<div class="fb-title">✏️ Give it a try first, ${NAME}!</div>Pick or type an answer, then press Check.`;
    return;
  }

  recordAttempt(q, correct);

  if(correct){
    markSolved(q);
    const wrap = document.getElementById(`${q.id}-wrap`);
    wrap.classList.add("solved");
    fb.className = "feedback good show";
    fb.innerHTML = `<div class="fb-title">✅ Yes! Nice work, ${NAME}!</div>`;
    const btn = document.getElementById(`${q.id}-btn`);
    btn.disabled = true; btn.textContent = "✓ Correct!";
    if(q.type==="mc") document.querySelectorAll(`input[name="${q.id}"]`).forEach(i=>i.disabled=true);
    else document.getElementById(`${q.id}-input`).disabled = true;

    const nowComplete = updateDayCompletion(currentDay);
    if(nowComplete){
      const banner = document.getElementById("dayBanner");
      if(banner) banner.classList.add("show");
      fireConfetti();
    }
  } else {
    fb.className = "feedback bad show";
    let steps = (q.hint||[]).map(h=>`<div class="hint-step"><span class="arrow">➜</span><span>${h}</span></div>`).join("");
    fb.innerHTML = `<div class="fb-title">💡 Not quite — here's how it works:</div>${steps}<div style="margin-top:6px">Try again, ${NAME}! You've got this.</div>`;
  }
}

/* ============================================================
   CONFETTI (lightweight canvas)
   ============================================================ */
const confettiCanvas = document.getElementById("confetti");
const cctx = confettiCanvas.getContext("2d");
let confettiParticles = [];
let confettiRAF = null;

function sizeCanvas(){
  confettiCanvas.width = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
}
window.addEventListener("resize", sizeCanvas);

function fireConfetti(){
  sizeCanvas();
  confettiCanvas.style.display = "block";
  const cs = getComputedStyle(document.documentElement);
  const cvar = n => (cs.getPropertyValue(n)||"").trim() || "#db2777";
  const colors = [cvar("--pink"), cvar("--accent"), cvar("--deep-rose"), "#ffffff", cvar("--blush-2"), cvar("--deep-rose-2")];
  confettiParticles = [];
  const cx = window.innerWidth/2;
  for(let i=0;i<140;i++){
    confettiParticles.push({
      x: cx + (Math.random()-0.5)*200,
      y: window.innerHeight*0.35 + (Math.random()-0.5)*80,
      vx: (Math.random()-0.5)*9,
      vy: Math.random()*-9 - 3,
      size: Math.random()*7 + 4,
      color: colors[Math.floor(Math.random()*colors.length)],
      rot: Math.random()*Math.PI,
      vr: (Math.random()-0.5)*0.3,
      life: 0,
    });
  }
  if(confettiRAF) cancelAnimationFrame(confettiRAF);
  animateConfetti();
}
function animateConfetti(){
  cctx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);
  let alive = false;
  confettiParticles.forEach(p=>{
    p.life++;
    p.vy += 0.22;
    p.x += p.vx; p.y += p.vy;
    p.rot += p.vr;
    p.vx *= 0.99;
    if(p.y < confettiCanvas.height + 30 && p.life < 200){
      alive = true;
      cctx.save();
      cctx.translate(p.x,p.y);
      cctx.rotate(p.rot);
      cctx.fillStyle = p.color;
      cctx.globalAlpha = Math.max(0, 1 - p.life/200);
      cctx.fillRect(-p.size/2, -p.size/2, p.size, p.size*0.6);
      cctx.restore();
    }
  });
  if(alive){ confettiRAF = requestAnimationFrame(animateConfetti); }
  else { confettiCanvas.style.display="none"; cctx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height); }
}

/* ============================================================
   PARENT ANALYTICS
   ============================================================ */
const analyticsOverlay = document.getElementById("analyticsOverlay");
const analyticsBody = document.getElementById("analyticsBody");

function computeAnalytics(){
  const recs = Object.values(STATE.analytics);
  const attempted = recs.filter(r=>r.attempts>0);
  const solved = recs.filter(r=>r.solved);
  const firstTry = solved.filter(r=>r.firstTry);
  const totalRetries = recs.reduce((s,r)=>s+r.retries,0);
  const firstTryAcc = attempted.length ? Math.round((firstTry.length/attempted.length)*100) : 0;

  function subjStats(sub){
    const s = attempted.filter(r=>r.subject===sub);
    const ft = s.filter(r=>r.solved && r.firstTry).length;
    const retries = s.reduce((a,r)=>a+r.retries,0);
    const acc = s.length ? Math.round((ft/s.length)*100) : 0;
    return {count:s.length, ft, retries, acc};
  }

  const topicMap = {};
  attempted.forEach(r=>{
    const key = r.standard + "||" + r.topic;
    if(!topicMap[key]) topicMap[key] = {standard:r.standard, topic:r.topic, subject:r.subject, attempted:0, firstTry:0, retries:0, solved:0};
    const t = topicMap[key];
    t.attempted++;
    if(r.solved) t.solved++;
    if(r.solved && r.firstTry) t.firstTry++;
    t.retries += r.retries;
  });
  const topics = Object.values(topicMap).map(t=>({ ...t, firstTryRate: t.attempted ? t.firstTry/t.attempted : 0 }));

  const review = topics.filter(t=> t.retries>0 || t.firstTryRate<1)
    .sort((a,b)=> (b.retries - a.retries) || (a.firstTryRate - b.firstTryRate));
  const strong = topics.filter(t=> t.retries===0 && t.firstTryRate===1 && t.attempted>0)
    .sort((a,b)=> b.attempted - a.attempted);

  return {
    solvedCount:solved.length, firstTryAcc, totalRetries,
    daysDone: STATE.completedDays.length,
    math: subjStats("Math"), reading: subjStats("Reading"),
    review, strong,
    hasData: attempted.length>0,
  };
}

function renderAnalytics(){
  const a = computeAnalytics();
  let html = "";
  html += `<div class="cards-row">
    <div class="stat-card"><div class="num">${a.solvedCount}</div><div class="lbl">Questions Solved</div></div>
    <div class="stat-card"><div class="num">${a.firstTryAcc}%</div><div class="lbl">First-Try Accuracy</div></div>
    <div class="stat-card"><div class="num">${a.totalRetries}</div><div class="lbl">Total Retries</div></div>
    <div class="stat-card"><div class="num">${a.daysDone}/28</div><div class="lbl">Days Completed</div></div>
  </div>`;
  if(!a.hasData){
    html += `<div class="analytics-section"><p class="empty-note">No practice data yet. Once ${NAME} answers some questions, her mastery signals will appear here.</p></div>`;
  } else {
    html += `<div class="analytics-section"><h3>By Subject — First-Try Accuracy</h3>`;
    html += subjRow("Math", a.math);
    html += subjRow("Reading", a.reading);
    html += `</div>`;
    html += `<div class="analytics-section"><h3>🔎 Areas to Review <span style="font-weight:400;font-size:.85rem;color:var(--muted)">(ranked by struggle)</span></h3>`;
    if(a.review.length===0){
      html += `<p class="empty-note">No trouble spots yet — ${NAME} is nailing everything on the first try!</p>`;
    } else {
      a.review.forEach(t=>{
        const rate = Math.round(t.firstTryRate*100);
        html += `<div class="topic-item"><div class="std-code">${t.standard} · ${t.subject}</div><div class="topic-title">${t.topic}</div><div class="topic-meta">First-try: ${t.firstTry}/${t.attempted} (${rate}%) · Retries: ${t.retries}</div></div>`;
      });
    }
    html += `</div>`;
    html += `<div class="analytics-section"><h3>💪 Strong Areas</h3>`;
    if(a.strong.length===0){
      html += `<p class="empty-note">Strong topics will show here once ${NAME} solves a topic on the first try with no retries.</p>`;
    } else {
      a.strong.forEach(t=>{
        html += `<div class="topic-item strong"><div class="std-code">${t.standard} · ${t.subject}</div><div class="topic-title">${t.topic}</div><div class="topic-meta">Solved ${t.firstTry}/${t.attempted} on the first try 🎉</div></div>`;
      });
    }
    html += `</div>`;
  }
  html += `<div style="text-align:center;margin-top:8px"><button class="reset-analytics-btn" id="resetAnalyticsBtn">⚠️ Reset all analytics & progress</button></div>`;
  analyticsBody.innerHTML = html;
  document.getElementById("resetAnalyticsBtn").addEventListener("click", ()=>{
    if(confirm(`Reset ALL of ${NAME}'s analytics and progress on this device? This cannot be undone.`)){
      STATE = defaultState();
      saveState();
      renderAnalytics();
      renderDashboard();
    }
  });
}

function subjRow(name, s){
  return `<div class="subj-row"><div class="subj-name">${name}</div><div class="subj-bar-track"><div class="subj-bar-fill" style="width:${s.acc}%">${s.acc}%</div></div><div class="subj-meta">${s.ft}/${s.count} first-try<br>${s.retries} retries</div></div>`;
}

dayOverlay.addEventListener("click", e=>{ if(e.target===dayOverlay) closeDay(); });

const analyticsBtn = document.getElementById("analyticsBtn");

  renderAnalytics();
  analyticsOverlay.classList.add("open");
  document.body.style.overflow="hidden";
  document.getElementById("analyticsClose").focus();
}

  analyticsOverlay.classList.remove("open");
  document.body.style.overflow="";

}

document.getElementById("analyticsClose").addEventListener("click", closeAnalytics);
analyticsOverlay.addEventListener("click", e=>{ if(e.target===analyticsOverlay) closeAnalytics(); });

  if(e.key==="Escape"){
    if(analyticsOverlay.classList.contains("open")) closeAnalytics();
    else if(dayOverlay.classList.contains("open")) closeDay();
  }
});

(function personaliseChrome(){
